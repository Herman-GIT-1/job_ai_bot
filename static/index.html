<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Job Cards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--tg-theme-bg-color, #f2f2f7);
  color: var(--tg-theme-text-color, #1c1c1e);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  padding: 12px 16px 10px;
  background: var(--tg-theme-secondary-bg-color, #fff);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-title { font-size: 17px; font-weight: 600; }
.header-count {
  font-size: 13px;
  color: var(--tg-theme-hint-color, #8e8e93);
  background: rgba(142,142,147,0.12);
  padding: 3px 9px;
  border-radius: 20px;
}

/* ── Deck area ── */
.deck {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow: hidden;
}

/* ── Card ── */
.card {
  position: absolute;
  width: calc(100% - 32px);
  max-width: 420px;
  background: var(--tg-theme-secondary-bg-color, #fff);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.10);
  cursor: grab;
  user-select: none;
  touch-action: none;
  will-change: transform;
  transition: box-shadow 0.2s;
}
.card.is-back {
  transform: scale(0.95) translateY(12px);
  z-index: 0;
  pointer-events: none;
}
.card.is-front { z-index: 1; }
.card.dragging  { cursor: grabbing; transition: none; }
.card.fly-left  {
  transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
  transform: translateX(-130%) rotate(-18deg) !important;
  opacity: 0;
  pointer-events: none;
}
.card.fly-right {
  transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
  transform: translateX(130%) rotate(18deg) !important;
  opacity: 0;
  pointer-events: none;
}
.card.fly-up {
  transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
  transform: translateY(-130%) !important;
  opacity: 0;
  pointer-events: none;
}
.card.snap-back {
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
}

/* Swipe hint labels */
.hint {
  position: absolute;
  top: 20px;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 1px;
  border-radius: 6px;
  padding: 4px 10px;
  border-width: 2px;
  border-style: solid;
  opacity: 0;
  transition: opacity 0.08s;
  pointer-events: none;
}
.hint-skip { left: 16px; color: #e74c3c; border-color: #e74c3c; }
.hint-save { right: 16px; color: #27ae60; border-color: #27ae60; }

/* Card content */
.card-score {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.score-badge {
  background: var(--tg-theme-button-color, #007aff);
  color: var(--tg-theme-button-text-color, #fff);
  font-size: 12px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 8px;
}
.score-stars { font-size: 13px; color: var(--tg-theme-hint-color, #8e8e93); }
.card-title   { font-size: 20px; font-weight: 700; line-height: 1.25; margin-bottom: 5px; }
.card-company { font-size: 14px; color: var(--tg-theme-hint-color, #8e8e93); margin-bottom: 10px; }
.card-salary  { font-size: 14px; font-weight: 600; color: #27ae60; margin-bottom: 10px; }
.card-desc {
  font-size: 14px;
  line-height: 1.55;
  color: var(--tg-theme-text-color, #3a3a3c);
  max-height: 130px;
  overflow: hidden;
  position: relative;
}
.card-desc::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 44px;
  background: linear-gradient(transparent, var(--tg-theme-secondary-bg-color, #fff));
}

/* ── Action buttons ── */
.actions {
  display: flex;
  gap: 10px;
  padding: 10px 16px 20px;
  flex-shrink: 0;
}
.btn {
  flex: 1;
  padding: 14px 6px;
  border: none;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
  line-height: 1.3;
}
.btn:active { transform: scale(0.94); opacity: 0.75; }
.btn-skip  { background: #fdecea; color: #c0392b; }
.btn-save  { background: #e8f5e9; color: #1e8449; }
.btn-apply {
  background: var(--tg-theme-button-color, #007aff);
  color: var(--tg-theme-button-text-color, #fff);
}

/* ── States ── */
.state {
  text-align: center;
  padding: 32px 24px;
  max-width: 320px;
}
.state-emoji { font-size: 52px; margin-bottom: 14px; }
.state h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.state p  { font-size: 15px; color: var(--tg-theme-hint-color, #8e8e93); line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Job Cards</span>
  <span class="header-count" id="counter"></span>
</div>

<div class="deck" id="deck">
  <div class="state">
    <div class="state-emoji">⏳</div>
    <h2>Loading…</h2>
  </div>
</div>

<div class="actions" id="actions" style="display:none">
  <button class="btn btn-skip"  onclick="doAction('skip')">❌<br>Skip</button>
  <button class="btn btn-save"  onclick="doAction('save')">📋<br>My list</button>
  <button class="btn btn-apply" onclick="doAction('apply')">✅<br>Apply</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── State ──────────────────────────────────────────────────────────────────
let jobs = [];
let cur  = 0;
let frontCard = null;
let dragStartX = 0, dragStartY = 0, dragDeltaX = 0;
let isDragging = false;

const deck    = document.getElementById('deck');
const actions = document.getElementById('actions');
const counter = document.getElementById('counter');

// ── API ────────────────────────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null) {
  const sep = path.includes('?') ? '&' : '?';
  const url = path + sep + 'init_data=' + encodeURIComponent(tg.initData);
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const detail = await res.text().catch(() => '');
    throw new Error('HTTP ' + res.status + ': ' + detail);
  }
  return res.json();
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function loadJobs() {
  try {
    const data = await apiFetch('/api/jobs');
    jobs = data.jobs || [];
    if (jobs.length === 0) {
      showState('🎉', 'All done!', 'No more jobs to review.\nRun /scrape to find more.');
    } else {
      actions.style.display = 'flex';
      renderDeck();
    }
  } catch (e) {
    showState('❌', 'Error', e.message + '\n\ninitData len: ' + tg.initData.length);
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────
function updateCounter() {
  const rem = jobs.length - cur;
  counter.textContent = rem > 0 ? rem + ' left' : '';
}

function renderDeck() {
  deck.innerHTML = '';
  if (cur >= jobs.length) {
    showState('🎉', 'All done!', 'No more jobs to review.\nRun /scrape to find more.');
    actions.style.display = 'none';
    counter.textContent = '';
    return;
  }
  updateCounter();

  // Back card (next job, slightly behind)
  if (cur + 1 < jobs.length) {
    const back = buildCard(jobs[cur + 1]);
    back.classList.add('is-back');
    deck.appendChild(back);
  }

  // Front card (current job)
  frontCard = buildCard(jobs[cur]);
  frontCard.classList.add('is-front');
  deck.appendChild(frontCard);
  attachDrag(frontCard);
}

function buildCard(job) {
  const el = document.createElement('div');
  el.className = 'card';

  const stars = buildStars(job.score);
  let salaryHtml = '';
  if (job.salary_min) {
    const c = job.salary_currency || 'PLN';
    const range = job.salary_max
      ? `${fmt(job.salary_min)}–${fmt(job.salary_max)}`
      : `from ${fmt(job.salary_min)}`;
    salaryHtml = `<div class="card-salary">💰 ${range} ${c}</div>`;
  }

  el.innerHTML = `
    <div class="hint hint-skip">SKIP</div>
    <div class="hint hint-save">SAVE</div>
    <div class="card-score">
      <span class="score-badge">${job.score}/10</span>
      <span class="score-stars">${stars}</span>
    </div>
    <div class="card-title">${esc(job.title)}</div>
    <div class="card-company">🏢 ${esc(job.company)}</div>
    ${salaryHtml}
    <div class="card-desc">${esc(job.description || 'No description available.')}</div>
  `;
  return el;
}

function buildStars(score) {
  const filled = Math.round(score / 2);
  return '★'.repeat(filled) + '☆'.repeat(5 - filled);
}

function fmt(n) { return Number(n).toLocaleString(); }
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function showState(emoji, title, text) {
  deck.innerHTML = `
    <div class="state">
      <div class="state-emoji">${emoji}</div>
      <h2>${title}</h2>
      <p>${text.replace(/\n/g, '<br>')}</p>
    </div>
  `;
}

// ── Drag (touch + mouse) ───────────────────────────────────────────────────
function attachDrag(card) {
  card.addEventListener('touchstart', onStart, { passive: true });
  card.addEventListener('touchmove',  onMove,  { passive: false });
  card.addEventListener('touchend',   onEnd);
  card.addEventListener('mousedown',  onStart);
}

function onStart(e) {
  isDragging = true;
  dragDeltaX = 0;
  const pt = e.touches ? e.touches[0] : e;
  dragStartX = pt.clientX;
  dragStartY = pt.clientY;
  frontCard.classList.add('dragging');
  if (!e.touches) {
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onEnd);
  }
}

function onMove(e) {
  if (!isDragging) return;
  if (e.cancelable) e.preventDefault();
  const pt  = e.touches ? e.touches[0] : e;
  dragDeltaX = pt.clientX - dragStartX;
  const dy   = (pt.clientY - dragStartY) * 0.25;
  const rot  = dragDeltaX * 0.07;
  frontCard.style.transform = `translateX(${dragDeltaX}px) translateY(${dy}px) rotate(${rot}deg)`;

  const skipHint = frontCard.querySelector('.hint-skip');
  const saveHint = frontCard.querySelector('.hint-save');
  if (dragDeltaX < -40) {
    skipHint.style.opacity = Math.min(Math.abs(dragDeltaX) / 100, 1);
    saveHint.style.opacity = 0;
  } else if (dragDeltaX > 40) {
    saveHint.style.opacity = Math.min(dragDeltaX / 100, 1);
    skipHint.style.opacity = 0;
  } else {
    skipHint.style.opacity = 0;
    saveHint.style.opacity = 0;
  }
}

function onEnd() {
  if (!isDragging) return;
  isDragging = false;
  frontCard.classList.remove('dragging');
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup',   onEnd);

  const threshold = window.innerWidth * 0.28;
  if (dragDeltaX < -threshold) {
    fly('skip');
  } else if (dragDeltaX > threshold) {
    fly('save');
  } else {
    frontCard.classList.add('snap-back');
    frontCard.style.transform = '';
    frontCard.querySelector('.hint-skip').style.opacity = 0;
    frontCard.querySelector('.hint-save').style.opacity = 0;
    frontCard.addEventListener('transitionend', () => frontCard.classList.remove('snap-back'), { once: true });
  }
  dragDeltaX = 0;
}

// ── Actions ────────────────────────────────────────────────────────────────
function doAction(type) {
  if (cur >= jobs.length || !frontCard) return;
  fly(type);
}

function fly(type) {
  const job = jobs[cur];
  const flyClass = type === 'skip' ? 'fly-left' : type === 'save' ? 'fly-right' : 'fly-up';

  frontCard.classList.add(flyClass);
  cur++;

  // Fire-and-forget API call — don't block the UI
  apiFetch('/api/' + type, 'POST', { job_id: job.id }).catch(console.error);

  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  if (type === 'apply') tg.openLink(job.link);

  setTimeout(renderDeck, 360);
}

// ── Start ──────────────────────────────────────────────────────────────────
loadJobs();
</script>
</body>
</html>
