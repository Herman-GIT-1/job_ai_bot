<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Job Cards</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--tg-theme-bg-color, #f2f2f7);
  color: var(--tg-theme-text-color, #1c1c1e);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  padding: 12px 16px 10px;
  background: var(--tg-theme-secondary-bg-color, #fff);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-title { font-size: 17px; font-weight: 600; }
.header-count {
  font-size: 13px;
  color: var(--tg-theme-hint-color, #8e8e93);
  background: rgba(142,142,147,0.12);
  padding: 3px 9px;
  border-radius: 20px;
  cursor: pointer;
}
.header-back {
  font-size: 15px;
  color: var(--tg-theme-button-color, #007aff);
  cursor: pointer;
  padding: 4px 0;
}

/* ── Tab bar (My List only) ── */
.tabs {
  display: flex;
  background: var(--tg-theme-secondary-bg-color, #fff);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  padding: 0 12px;
  gap: 4px;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 9px 4px;
  border: none;
  background: none;
  font-size: 12px;
  font-weight: 500;
  color: var(--tg-theme-hint-color, #8e8e93);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  line-height: 1.3;
}
.tab.active {
  color: var(--tg-theme-button-color, #007aff);
  border-bottom-color: var(--tg-theme-button-color, #007aff);
  font-weight: 600;
}

/* ── Deck area ── */
.deck {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow: hidden;
}

/* ── Card ── */
.card {
  position: absolute;
  width: calc(100% - 32px);
  max-width: 420px;
  background: var(--tg-theme-secondary-bg-color, #fff);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.10);
  cursor: grab;
  user-select: none;
  touch-action: none;
  will-change: transform;
  transition: box-shadow 0.2s;
}
.card.is-back {
  transform: scale(0.95) translateY(12px);
  z-index: 0;
  pointer-events: none;
}
.card.is-front { z-index: 1; }
.card.dragging  { cursor: grabbing; transition: none; }
.card.fly-left  {
  transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
  transform: translateX(-130%) rotate(-18deg) !important;
  opacity: 0; pointer-events: none;
}
.card.fly-right {
  transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
  transform: translateX(130%) rotate(18deg) !important;
  opacity: 0; pointer-events: none;
}
.card.snap-back { transition: transform 0.3s cubic-bezier(.4,0,.2,1); }

/* Swipe hint labels */
.hint {
  position: absolute; top: 20px;
  font-size: 18px; font-weight: 800; letter-spacing: 1px;
  border-radius: 6px; padding: 4px 10px;
  border-width: 2px; border-style: solid;
  opacity: 0; transition: opacity 0.08s; pointer-events: none;
}
.hint-skip { left: 16px; color: #e74c3c; border-color: #e74c3c; }
.hint-save { right: 16px; color: #27ae60; border-color: #27ae60; }

/* Card content */
.card-score { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.score-badge {
  background: var(--tg-theme-button-color, #007aff);
  color: var(--tg-theme-button-text-color, #fff);
  font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 8px;
}
.score-stars { font-size: 13px; color: var(--tg-theme-hint-color, #8e8e93); }
.card-title   { font-size: 20px; font-weight: 700; line-height: 1.25; margin-bottom: 5px; }
.card-company { font-size: 14px; color: var(--tg-theme-hint-color, #8e8e93); margin-bottom: 10px; }
.card-desc {
  font-size: 14px; line-height: 1.55;
  color: var(--tg-theme-text-color, #3a3a3c);
  max-height: 130px; overflow: hidden; position: relative;
}
.card-desc::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 44px;
  background: linear-gradient(transparent, var(--tg-theme-secondary-bg-color, #fff));
}

/* ── Action buttons ── */
.actions {
  display: flex; gap: 10px;
  padding: 10px 16px 10px; flex-shrink: 0;
}
.btn {
  flex: 1; padding: 14px 6px; border: none; border-radius: 14px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: transform 0.1s, opacity 0.1s; line-height: 1.3;
}
.btn:active { transform: scale(0.94); opacity: 0.75; }
.btn-skip { background: #fdecea; color: #c0392b; }
.btn-list { background: rgba(142,142,147,0.15); color: var(--tg-theme-text-color, #1c1c1e); }
.btn-save {
  background: var(--tg-theme-button-color, #007aff);
  color: var(--tg-theme-button-text-color, #fff);
}
.btn-skip.disabled, .btn-save.disabled {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}

/* ── Bottom nav bar ── */
.bottom-nav {
  display: flex;
  background: var(--tg-theme-secondary-bg-color, #fff);
  border-top: 1px solid rgba(0,0,0,0.08);
  padding: 6px 0 max(6px, env(safe-area-inset-bottom));
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  border: none;
  background: none;
  font-size: 10px;
  font-weight: 500;
  color: var(--tg-theme-hint-color, #8e8e93);
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.nav-btn .nav-icon { font-size: 22px; line-height: 1; }
.nav-btn.active { color: var(--tg-theme-button-color, #007aff); font-weight: 600; }

/* ── My List view ── */
.list-view {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 20px;
  display: none;
  flex-direction: column;
  gap: 12px;
}
.list-view.active { display: flex; }

/* ── Profile view ── */
.profile-view {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  display: none;
  flex-direction: column;
  gap: 14px;
}
.profile-view.active { display: flex; }

.profile-card {
  background: var(--tg-theme-secondary-bg-color, #fff);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.profile-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--tg-theme-hint-color, #8e8e93);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.stat-cell {
  text-align: center;
  padding: 10px 6px;
  background: var(--tg-theme-bg-color, #f2f2f7);
  border-radius: 12px;
}
.stat-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--tg-theme-button-color, #007aff);
  line-height: 1.1;
}
.stat-label {
  font-size: 11px;
  color: var(--tg-theme-hint-color, #8e8e93);
  margin-top: 3px;
}

/* Resume block — styles moved inline below */
.resume-empty {
  font-size: 14px;
  color: var(--tg-theme-hint-color, #8e8e93);
  text-align: center;
  padding: 12px 0;
}
.resume-file-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
}
.resume-file-icon { font-size: 24px; flex-shrink: 0; }
.resume-file-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.resume-file-open {
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--tg-theme-button-color, #007aff);
  text-decoration: none;
  padding: 5px 12px;
  border: 1.5px solid var(--tg-theme-button-color, #007aff);
  border-radius: 10px;
}
.resume-replace-btn {
  width: 100%;
  margin-top: 10px;
  padding: 11px;
  border: none;
  border-radius: 12px;
  background: rgba(142,142,147,0.15);
  color: var(--tg-theme-text-color, #1c1c1e);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.resume-replace-btn:active { opacity: 0.65; }

/* ── Filters ── */
.city-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.city-btn {
  padding: 8px 14px;
  border: 1.5px solid rgba(142,142,147,0.3);
  border-radius: 20px;
  background: none;
  font-size: 14px;
  font-weight: 500;
  color: var(--tg-theme-text-color, #1c1c1e);
  cursor: pointer;
  transition: all 0.15s;
}
.city-btn.active {
  background: var(--tg-theme-button-color, #007aff);
  border-color: var(--tg-theme-button-color, #007aff);
  color: var(--tg-theme-button-text-color, #fff);
  font-weight: 600;
}
.filter-hint {
  font-size: 13px;
  color: var(--tg-theme-hint-color, #8e8e93);
  margin-bottom: 10px;
  line-height: 1.45;
}
.skills-input {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid rgba(142,142,147,0.25);
  border-radius: 12px;
  background: var(--tg-theme-bg-color, #f2f2f7);
  color: var(--tg-theme-text-color, #1c1c1e);
  font-size: 15px;
  outline: none;
}
.skills-input:focus { border-color: var(--tg-theme-button-color, #007aff); }
.filter-save-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: var(--tg-theme-button-color, #007aff);
  color: var(--tg-theme-button-text-color, #fff);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.filter-save-btn:active { opacity: 0.75; }
.filter-save-btn:disabled { opacity: 0.5; cursor: default; }
.filter-clear-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 14px;
  background: rgba(142,142,147,0.15);
  color: var(--tg-theme-hint-color, #8e8e93);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-top: -6px;
}
.filter-clear-btn:active { opacity: 0.65; }

/* Settings rows */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; }
.setting-value {
  font-size: 14px;
  color: var(--tg-theme-hint-color, #8e8e93);
}
.setting-hint {
  font-size: 12px;
  color: var(--tg-theme-hint-color, #8e8e93);
  margin-top: 10px;
  line-height: 1.5;
}

/* ── List item ── */
.list-item {
  background: var(--tg-theme-secondary-bg-color, #fff);
  border-radius: 16px;
  padding: 14px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.list-item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.list-item-info { flex: 1; min-width: 0; }
.list-item-title   { font-size: 15px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-item-company { font-size: 12px; color: var(--tg-theme-hint-color, #8e8e93); }
.list-item-score {
  font-size: 11px; font-weight: 700;
  background: var(--tg-theme-button-color, #007aff);
  color: var(--tg-theme-button-text-color, #fff);
  padding: 2px 7px; border-radius: 8px; white-space: nowrap; flex-shrink: 0;
}

/* Item action row */
.item-actions { display: flex; gap: 6px; margin-top: 10px; }
.item-btn {
  flex: 1; padding: 8px 4px; border: none; border-radius: 10px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: opacity 0.1s;
}
.item-btn:active { opacity: 0.65; }
.item-btn:disabled { opacity: 0.45; cursor: default; }
.item-btn-apply   { background: var(--tg-theme-button-color, #007aff); color: var(--tg-theme-button-text-color, #fff); }
.item-btn-interview { background: #e8f4fd; color: #1a73e8; }
.item-btn-offer     { background: #e6f9ec; color: #1a7f3c; }
.item-btn-reject    { background: #fdecea; color: #c0392b; }
.item-btn-restore   { background: rgba(142,142,147,0.15); color: var(--tg-theme-text-color, #1c1c1e); }
.item-btn-letter    { background: #f0eaff; color: #6c35de; }

/* ── States ── */
.state { text-align: center; padding: 32px 24px; max-width: 320px; margin: auto; }
.state-emoji { font-size: 52px; margin-bottom: 14px; }
.state h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.state p  { font-size: 15px; color: var(--tg-theme-hint-color, #8e8e93); line-height: 1.5; }
</style>
</head>
<body>

<!-- Cards view header -->
<div class="header" id="header-cards">
  <span class="header-title">Job Cards</span>
  <span class="header-count" id="counter" onclick="openMyList()" title="My list"></span>
</div>

<!-- My list view header -->
<div class="header" id="header-list" style="display:none">
  <span class="header-back" onclick="closeMyList()">← Back</span>
  <span class="header-title">My List</span>
  <span style="width:48px"></span>
</div>

<!-- Profile view header -->
<div class="header" id="header-profile" style="display:none">
  <span class="header-title">Profile</span>
  <span style="width:48px"></span>
</div>

<!-- Filters view header -->
<div class="header" id="header-filters" style="display:none">
  <span class="header-title">Filters</span>
  <span style="width:48px"></span>
</div>

<!-- Tab bar (shown only in My List view) -->
<div class="tabs" id="tab-bar" style="display:none">
  <button class="tab active" data-tab="saved"        onclick="switchTab('saved')">💾<br>Saved</button>
  <button class="tab"        data-tab="applied"      onclick="switchTab('applied')">✅<br>Applied</button>
  <button class="tab"        data-tab="interviewing" onclick="switchTab('interviewing')">📞<br>Interview</button>
  <button class="tab"        data-tab="rejected"     onclick="switchTab('rejected')">❌<br>Rejected</button>
  <button class="tab"        data-tab="offer"        onclick="switchTab('offer')">🎉<br>Offers</button>
</div>

<!-- Card deck -->
<div class="deck" id="deck">
  <div class="state"><div class="state-emoji">⏳</div><h2>Loading…</h2></div>
</div>

<!-- My list -->
<div class="list-view" id="list-view"></div>

<!-- Profile view -->
<div class="profile-view" id="profile-view"></div>

<!-- Filters view -->
<div class="profile-view" id="filters-view"></div>

<!-- Action buttons (cards view only) -->
<div class="actions" id="actions" style="display:none">
  <button class="btn btn-skip" onclick="doAction('skip')">❌<br>Skip</button>
  <button class="btn btn-list" onclick="openMyList()">📋<br>My list</button>
  <button class="btn btn-save" onclick="doAction('save')">💾<br>Save</button>
</div>

<!-- Bottom nav bar -->
<div class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" id="nav-cards" onclick="showView('cards')">
    <span class="nav-icon">🃏</span>Cards
  </button>
  <button class="nav-btn" id="nav-filters" onclick="showView('filters')">
    <span class="nav-icon">🔍</span>Filters
  </button>
  <button class="nav-btn" id="nav-profile" onclick="showView('profile')">
    <span class="nav-icon">👤</span>Profile
  </button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function getInitData() {
  if (tg.initData) return tg.initData;
  const hash = location.hash.slice(1);
  if (hash) {
    const p = new URLSearchParams(hash);
    const d = p.get('tgWebAppData');
    if (d) return d;
  }
  return '';
}

function waitForInitData(retries, callback) {
  if (getInitData()) { callback(); return; }
  if (retries <= 0)  { callback(); return; }
  setTimeout(() => waitForInitData(retries - 1, callback), 150);
}

// ── State ──────────────────────────────────────────────────────────────────
let jobs = [];
let cur  = 0;
let frontCard = null;
let dragStartX = 0, dragDeltaX = 0;
let isDragging = false;
let inListView = false;
let currentView = 'cards';  // 'cards' | 'filters' | 'profile'
let currentTab = 'saved';

const deck           = document.getElementById('deck');
const listView       = document.getElementById('list-view');
const profileView    = document.getElementById('profile-view');
const filtersView    = document.getElementById('filters-view');
const actions        = document.getElementById('actions');
const counter        = document.getElementById('counter');
const headerCards    = document.getElementById('header-cards');
const headerList     = document.getElementById('header-list');
const headerProfile  = document.getElementById('header-profile');
const headerFilters  = document.getElementById('header-filters');
const tabBar         = document.getElementById('tab-bar');
const bottomNav      = document.getElementById('bottom-nav');

// ── API ────────────────────────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null) {
  const sep = path.includes('?') ? '&' : '?';
  const url = path + sep + 'init_data=' + encodeURIComponent(getInitData());
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const detail = await res.text().catch(() => '');
    throw new Error('HTTP ' + res.status + ': ' + detail);
  }
  return res.json();
}

// ── View switching ─────────────────────────────────────────────────────────
function showView(view) {
  currentView = view;

  // Reset My List if open
  if (inListView) {
    inListView = false;
    listView.classList.remove('active');
    listView.innerHTML = '';
    headerList.style.display  = 'none';
    tabBar.style.display      = 'none';
  }

  const isCards   = view === 'cards';
  const isProfile = view === 'profile';
  const isFilters = view === 'filters';

  headerCards.style.display   = isCards   ? 'flex' : 'none';
  headerProfile.style.display = isProfile ? 'flex' : 'none';
  headerFilters.style.display = isFilters ? 'flex' : 'none';
  deck.style.display          = isCards   ? ''     : 'none';
  actions.style.display       = isCards   ? 'flex' : 'none';
  profileView.classList.toggle('active', isProfile);
  filtersView.classList.toggle('active', isFilters);
  bottomNav.style.display     = 'flex';

  document.getElementById('nav-cards').classList.toggle('active', isCards);
  document.getElementById('nav-filters').classList.toggle('active', isFilters);
  document.getElementById('nav-profile').classList.toggle('active', isProfile);

  if (isProfile) loadProfile();
  if (isFilters) loadFilters();
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function loadJobs() {
  try {
    const data = await apiFetch('/api/jobs');
    jobs = data.jobs || [];
    actions.style.display = 'flex';
    if (jobs.length === 0) {
      setSwipeButtonsDisabled(true);
      showState('🎉', 'All done!', 'No more jobs to review.\nRun /scrape to find more.');
    } else {
      renderDeck();
    }
  } catch (e) {
    const id = getInitData();
    const h = location.hash.slice(1);
    const dbg = [
      'initData len: ' + id.length,
      'tg.initData len: ' + tg.initData.length,
      'hash len: ' + h.length,
      'hash[:80]: ' + h.slice(0, 80),
      'version: ' + (tg.version || '—'),
      'platform: ' + (tg.platform || '—'),
      'proxy: ' + (!!window.TelegramWebviewProxy),
    ].join('\n');
    showState('❌', 'Error', e.message + '\n\n' + dbg);
  }
}

// ── My List view ───────────────────────────────────────────────────────────
function openMyList(tab) {
  inListView = true;
  deck.style.display          = 'none';
  profileView.classList.remove('active');
  actions.style.display       = 'none';
  headerCards.style.display   = 'none';
  headerProfile.style.display = 'none';
  headerList.style.display    = 'flex';
  tabBar.style.display        = 'flex';
  bottomNav.style.display     = 'none';
  listView.classList.add('active');
  switchTab(tab || currentTab);
}

function closeMyList() {
  inListView = false;
  listView.classList.remove('active');
  listView.innerHTML = '';
  headerList.style.display = 'none';
  tabBar.style.display     = 'none';
  showView(currentView);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  loadTab(tab);
}

async function loadTab(tab) {
  listView.innerHTML = '<div class="state"><div class="state-emoji">⏳</div><h2>Loading…</h2></div>';
  try {
    let data;
    if (tab === 'saved') {
      data = await apiFetch('/api/saved');
    } else {
      data = await apiFetch('/api/tracker?status=' + tab);
    }
    renderTab(tab, data.jobs || []);
  } catch (e) {
    listView.innerHTML = `<div class="state"><div class="state-emoji">❌</div><h2>Error</h2><p>${esc(e.message)}</p></div>`;
  }
}

// ── Profile view ───────────────────────────────────────────────────────────
const LANG_LABELS = { en: '🇬🇧 English', ru: '🇷🇺 Русский', pl: '🇵🇱 Polski' };

async function loadProfile() {
  profileView.innerHTML = '<div class="state"><div class="state-emoji">⏳</div><h2>Loading…</h2></div>';
  try {
    const d = await apiFetch('/api/profile');
    renderProfile(d);
  } catch (e) {
    profileView.innerHTML = `<div class="state"><div class="state-emoji">❌</div><h2>Error</h2><p>${esc(e.message)}</p></div>`;
  }
}

function renderProfile(d) {
  const s = d.stats;
  const avg = s.avg_score != null ? s.avg_score + '/10' : '—';
  const langLabel = LANG_LABELS[d.lang] || d.lang;

  let resumeBlock;
  if (d.resume_file_name) {
    const fileUrl = '/api/resume/file?init_data=' + encodeURIComponent(getInitData());
    const ext = d.resume_file_name.split('.').pop().toUpperCase();
    resumeBlock = `
      <div class="resume-file-row">
        <span class="resume-file-icon">📄</span>
        <span class="resume-file-name">${esc(d.resume_file_name)}</span>
        <a class="resume-file-open" href="${fileUrl}" target="_blank">${ext === 'TXT' ? 'Open' : 'View ' + ext}</a>
      </div>
      <button class="resume-replace-btn" onclick="replaceResume()">Replace resume</button>`;
  } else if (d.has_resume) {
    resumeBlock = `
      <div class="resume-empty">Resume text saved (original file not available).</div>
      <button class="resume-replace-btn" onclick="replaceResume()">Replace resume</button>`;
  } else {
    resumeBlock = `<div class="resume-empty">No resume uploaded.<br>Send a .txt / .pdf / .docx file to the bot.</div>`;
  }

  profileView.innerHTML = `
    <!-- Stats -->
    <div class="profile-card">
      <div class="profile-card-title">Statistics</div>
      <div class="stats-grid">
        <div class="stat-cell"><div class="stat-value">${s.total}</div><div class="stat-label">Total</div></div>
        <div class="stat-cell"><div class="stat-value">${s.scored}</div><div class="stat-label">Scored</div></div>
        <div class="stat-cell"><div class="stat-value">${avg}</div><div class="stat-label">Avg score</div></div>
        <div class="stat-cell"><div class="stat-value">${s.applied}</div><div class="stat-label">Applied</div></div>
        <div class="stat-cell"><div class="stat-value">${s.interested}</div><div class="stat-label">Saved</div></div>
        <div class="stat-cell"><div class="stat-value">${s.skipped}</div><div class="stat-label">Skipped</div></div>
      </div>
    </div>

    <!-- Resume -->
    <div class="profile-card">
      <div class="profile-card-title">Resume</div>
      ${resumeBlock}
    </div>

    <!-- Settings -->
    <div class="profile-card">
      <div class="profile-card-title">Settings</div>
      <div class="setting-row">
        <span class="setting-label">Language</span>
        <span class="setting-value">${langLabel}</span>
      </div>
      <div class="setting-hint">Change language via /language in the bot.</div>
    </div>
  `;
}

function replaceResume() {
  tg.showAlert('To replace your resume — send a new .txt, .pdf or .docx file directly in the bot chat.');
}

// ── Filters view ───────────────────────────────────────────────────────────
let _filtersData = null;

async function loadFilters() {
  filtersView.innerHTML = '<div class="state"><div class="state-emoji">⏳</div><h2>Loading…</h2></div>';
  try {
    _filtersData = await apiFetch('/api/filters');
    renderFilters(_filtersData);
  } catch (e) {
    filtersView.innerHTML = `<div class="state"><div class="state-emoji">❌</div><h2>Error</h2><p>${esc(e.message)}</p></div>`;
  }
}

function renderFilters(d) {
  const cityBtns = d.cities.map(c =>
    `<button class="city-btn${c === d.city ? ' active' : ''}" onclick="selectCity('${esc(c)}')">${esc(c)}</button>`
  ).join('');

  filtersView.innerHTML = `
    <!-- City -->
    <div class="profile-card">
      <div class="profile-card-title">City</div>
      <div class="city-grid" id="city-grid">${cityBtns}</div>
    </div>

    <!-- Skills -->
    <div class="profile-card">
      <div class="profile-card-title">Skills filter</div>
      <p class="filter-hint">Show only jobs that mention these skills. Leave empty to show all jobs.</p>
      <input id="skills-input" class="skills-input" type="text"
             placeholder="e.g. Python, SQL, React"
             value="${esc(d.skills.join(', '))}">
    </div>

    <!-- Save button -->
    <button class="filter-save-btn" id="filter-save-btn" onclick="saveFilters()">Save filters</button>
    ${d.skills.length ? '<button class="filter-clear-btn" onclick="clearSkills()">Clear skills filter</button>' : ''}
  `;
}

function selectCity(city) {
  _filtersData.city = city;
  document.querySelectorAll('.city-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === city);
  });
}

async function saveFilters() {
  const btn = document.getElementById('filter-save-btn');
  const skillsRaw = (document.getElementById('skills-input')?.value || '').trim();
  const skills = skillsRaw ? skillsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    await apiFetch('/api/filters', 'POST', { city: _filtersData.city, skills });
    btn.textContent = 'Saved ✓';
    _filtersData.skills = skills;
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Save filters'; }, 1500);
  } catch (e) {
    btn.textContent = 'Error — retry';
    btn.disabled = false;
  }
}

async function clearSkills() {
  document.getElementById('skills-input').value = '';
  _filtersData.skills = [];
  await saveFilters();
  renderFilters(_filtersData);
}

// ── Tab renderers ──────────────────────────────────────────────────────────
const TAB_EMPTY = {
  saved:        ['📋', 'Nothing saved yet', 'Swipe right or press Save to add vacancies here.'],
  applied:      ['✅', 'No applications yet', 'Press Apply on a saved vacancy to track it here.'],
  interviewing: ['📞', 'No interviews yet', 'Move an applied vacancy to Interview to track it here.'],
  rejected:     ['😔', 'No rejections', 'Rejected vacancies will appear here.'],
  offer:        ['🎉', 'No offers yet', 'Mark a vacancy as Offer when you get one!'],
};

function renderTab(tab, jobList) {
  if (jobList.length === 0) {
    const [emoji, title, text] = TAB_EMPTY[tab] || ['📭', 'Empty', ''];
    listView.innerHTML = `<div class="state"><div class="state-emoji">${emoji}</div><h2>${title}</h2><p>${text}</p></div>`;
    return;
  }
  listView.innerHTML = '';
  jobList.forEach(job => listView.appendChild(buildListItem(tab, job)));
}

function buildListItem(tab, job) {
  const item = document.createElement('div');
  item.className = 'list-item';
  item.id = 'item-' + job.id;
  const actionsHtml = buildItemActions(tab, job);
  item.innerHTML = `
    <div class="list-item-top">
      <div class="list-item-info">
        <div class="list-item-title">${esc(job.title)}</div>
        <div class="list-item-company">🏢 ${esc(job.company)}</div>
      </div>
      <span class="list-item-score">${job.score}/10</span>
    </div>
    <div class="item-actions">${actionsHtml}</div>
  `;
  return item;
}

function buildItemActions(tab, job) {
  const id   = job.id;
  const link = esc(job.link);
  if (tab === 'saved') {
    const letterBtn = job.cover_letter
      ? `<button class="item-btn item-btn-letter" onclick="sendLetter(${id},this)">📄 Letter</button>`
      : '';
    return `
      <button class="item-btn item-btn-apply"  onclick="applyJob(${id},'${link}',this)">✅ Apply</button>
      ${letterBtn}
      <button class="item-btn item-btn-reject" onclick="moveStatus(${id},'rejected',this)">❌ Skip</button>
    `;
  }
  if (tab === 'applied') {
    return `
      <button class="item-btn item-btn-apply"     onclick="applyJob(${id},'${link}',this)">↗ Open</button>
      <button class="item-btn item-btn-interview" onclick="moveStatus(${id},'interviewing',this)">📞 Interview</button>
      <button class="item-btn item-btn-reject"    onclick="moveStatus(${id},'rejected',this)">❌ Rejected</button>
    `;
  }
  if (tab === 'interviewing') {
    return `
      <button class="item-btn item-btn-apply"     onclick="applyJob(${id},'${link}',this)">↗ Open</button>
      <button class="item-btn item-btn-offer"     onclick="moveStatus(${id},'offer',this)">🎉 Offer!</button>
      <button class="item-btn item-btn-reject"    onclick="moveStatus(${id},'rejected',this)">❌ Rejected</button>
    `;
  }
  if (tab === 'rejected') {
    return `
      <button class="item-btn item-btn-restore"   onclick="moveStatus(${id},'interested',this)">↩ Restore</button>
      <button class="item-btn item-btn-interview" onclick="moveStatus(${id},'interviewing',this)">📞 Interview</button>
    `;
  }
  if (tab === 'offer') {
    return `
      <button class="item-btn item-btn-apply"     onclick="applyJob(${id},'${link}',this)">↗ Open</button>
    `;
  }
  return '';
}

// ── Item actions ───────────────────────────────────────────────────────────
async function applyJob(jobId, link, btn) {
  btn.disabled = true;
  btn.textContent = 'Opened ✓';
  apiFetch('/api/apply', 'POST', { job_id: jobId }).catch(console.error);
  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  tg.openLink(link);
}

async function sendLetter(jobId, btn) {
  btn.disabled = true;
  btn.textContent = '⏳';
  try {
    await apiFetch('/api/letter', 'POST', { job_id: jobId });
    btn.textContent = 'Sent ✓';
    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '📄 Letter';
    console.error(e);
  }
}

async function moveStatus(jobId, status, btn) {
  const row = btn.closest('.list-item');
  btn.disabled = true;
  try {
    await apiFetch('/api/status', 'POST', { job_id: jobId, status });
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    row.style.transition = 'opacity 0.25s, transform 0.25s';
    row.style.opacity    = '0';
    row.style.transform  = 'scale(0.92)';
    setTimeout(() => {
      row.remove();
      if (listView.querySelectorAll('.list-item').length === 0) {
        const [emoji, title, text] = TAB_EMPTY[currentTab] || ['📭', 'Empty', ''];
        listView.innerHTML = `<div class="state"><div class="state-emoji">${emoji}</div><h2>${title}</h2><p>${text}</p></div>`;
      }
    }, 260);
  } catch (e) {
    btn.disabled = false;
    console.error(e);
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────
function setSwipeButtonsDisabled(disabled) {
  document.querySelector('.btn-skip').classList.toggle('disabled', disabled);
  document.querySelector('.btn-save').classList.toggle('disabled', disabled);
}

function updateCounter() {
  const rem = jobs.length - cur;
  counter.textContent = rem > 0 ? rem + ' left' : '';
}

function renderDeck() {
  if (inListView || currentView !== 'cards') return;
  deck.innerHTML = '';
  if (cur >= jobs.length) {
    setSwipeButtonsDisabled(true);
    showState('🎉', 'All done!', 'No more jobs to review.\nRun /scrape to find more.');
    counter.textContent = '';
    return;
  }
  setSwipeButtonsDisabled(false);
  updateCounter();
  if (cur + 1 < jobs.length) {
    const back = buildCard(jobs[cur + 1]);
    back.classList.add('is-back');
    deck.appendChild(back);
  }
  frontCard = buildCard(jobs[cur]);
  frontCard.classList.add('is-front');
  deck.appendChild(frontCard);
  attachDrag(frontCard);
}

function buildCard(job) {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="hint hint-skip">SKIP</div>
    <div class="hint hint-save">SAVE</div>
    <div class="card-score">
      <span class="score-badge">${job.score}/10</span>
      <span class="score-stars">${buildStars(job.score)}</span>
    </div>
    <div class="card-title">${esc(job.title)}</div>
    <div class="card-company">🏢 ${esc(job.company)}</div>
    <div class="card-desc">${esc(job.description || 'No description available.')}</div>
  `;
  return el;
}

function buildStars(score) {
  const f = Math.round(score / 2);
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showState(emoji, title, text) {
  deck.innerHTML = `<div class="state"><div class="state-emoji">${emoji}</div><h2>${title}</h2><p>${text.replace(/\n/g,'<br>')}</p></div>`;
}

// ── Drag ───────────────────────────────────────────────────────────────────
function attachDrag(card) {
  card.addEventListener('touchstart', onStart, { passive: true });
  card.addEventListener('touchmove',  onMove,  { passive: false });
  card.addEventListener('touchend',   onEnd);
  card.addEventListener('mousedown',  onStart);
}
function onStart(e) {
  isDragging = true; dragDeltaX = 0;
  const pt = e.touches ? e.touches[0] : e;
  dragStartX = pt.clientX;
  frontCard.classList.add('dragging');
  if (!e.touches) {
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onEnd);
  }
}
function onMove(e) {
  if (!isDragging) return;
  if (e.cancelable) e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  dragDeltaX = pt.clientX - dragStartX;
  const rot = dragDeltaX * 0.07;
  frontCard.style.transform = `translateX(${dragDeltaX}px) rotate(${rot}deg)`;
  const skipHint = frontCard.querySelector('.hint-skip');
  const saveHint = frontCard.querySelector('.hint-save');
  if (dragDeltaX < -40) {
    skipHint.style.opacity = Math.min(Math.abs(dragDeltaX)/100,1); saveHint.style.opacity=0;
  } else if (dragDeltaX > 40) {
    saveHint.style.opacity = Math.min(dragDeltaX/100,1); skipHint.style.opacity=0;
  } else {
    skipHint.style.opacity=0; saveHint.style.opacity=0;
  }
}
function onEnd() {
  if (!isDragging) return;
  isDragging = false;
  frontCard.classList.remove('dragging');
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup',   onEnd);
  const threshold = window.innerWidth * 0.28;
  if (dragDeltaX < -threshold) fly('skip');
  else if (dragDeltaX > threshold) fly('save');
  else {
    frontCard.classList.add('snap-back');
    frontCard.style.transform = '';
    frontCard.querySelector('.hint-skip').style.opacity = 0;
    frontCard.querySelector('.hint-save').style.opacity = 0;
    frontCard.addEventListener('transitionend', () => frontCard.classList.remove('snap-back'), { once: true });
  }
  dragDeltaX = 0;
}

// ── Actions ────────────────────────────────────────────────────────────────
function doAction(type) {
  if (cur >= jobs.length || !frontCard) return;
  fly(type);
}
function fly(type) {
  const job = jobs[cur];
  frontCard.classList.add(type === 'skip' ? 'fly-left' : 'fly-right');
  cur++;
  apiFetch('/api/' + type, 'POST', { job_id: job.id }).catch(console.error);
  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  setTimeout(renderDeck, 360);
}

// ── Start ──────────────────────────────────────────────────────────────────
waitForInitData(5, loadJobs);
</script>
